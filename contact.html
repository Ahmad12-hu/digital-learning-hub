<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">

<body>

    <header>
        <div class="logo">
            <img src="monlogo.svg" alt="Digital Learning Hub" height="80">
        </div>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="about.html">À propos</a>
            <a href="services.html">Formations</a>
            <a href="blog.html">Blog</a>

    <section class="page-banner">
        <h1>Contactez-nous</h1>
        <p>Nous sommes là pour répondre à vos questions</p>
    </section>

    <section class="contact-section">
        <form class="contact-form">
            <label>Votre nom</label>
            <input type="text" placeholder="Ex: Mamadou Diallo">
            <label>Votre email</label>
            <input type="email" placeholder="votre@email.com">
            <label>Votre message</label>
            <textarea rows="6" placeholder="Écrivez votre message ici..."></textarea>
            <button type="submit">Envoyer le message</button>
        </form>
        <div class="contact-infos">
            <div class="info-item">
                <h3>📍 Adresse</h3>
                <p>Dakar, Sénégal</p>
            </div>
            <div class="info-item">
                <h3>📞 Téléphone</h3>
                <p>+221 781081986</p>
            </div>
            <div class="info-item">
                <h3>✉️ Email</h3>
                <p>contact@digitallearninghub.sn</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Digital Learning Hub — DAKAR, Sénégal.</p>
